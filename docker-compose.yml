version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: focuskids-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: focuskids_db
      MYSQL_USER: focuskids
      MYSQL_PASSWORD: focuskids123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - focuskids-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: focuskids-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/focuskids_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: focuskids
      SPRING_DATASOURCE_PASSWORD: focuskids123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - focuskids-net

networks:
  focuskids-net:
    driver: bridge

volumes:
  mysql_data: